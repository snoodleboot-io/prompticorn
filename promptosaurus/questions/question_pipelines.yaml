# Question pipelines for each language
# Each pipeline defines the sequence of questions to ask during init
#
# STRUCTURE:
# - core: Questions asked ONCE per language (same across all folders)
# - fungible: Questions asked for EACH folder with context-aware options
#   Keyed by folder type (backend/api, backend/worker, frontend/ui, etc.)

python:
  core:
    - PythonRuntimeQuestion
    - PythonPackageManagerQuestion
    - PythonTestFrameworkQuestion
    - PythonTestRunnerQuestion
    - PythonLinterQuestion
    - PythonFormatterQuestion
    - PythonAbstractClassStyleQuestion
    - PythonCoverageTargetsQuestion
    - PythonMockingLibraryQuestion
    - PythonCoverageToolQuestion
    - PythonMutationToolQuestion
  fungible:
    backend/api:
      - PythonAPIFrameworkQuestion
    backend/worker:
      - PythonWorkerFrameworkQuestion
    frontend/ui:
      - PythonUIFrameworkQuestion
    frontend/e2e: []

typescript:
  core:
    - TypeScriptVersionQuestion
    - TypeScriptPackageManagerQuestion
    - TypeScriptTestFrameworkQuestion
  fungible:
    frontend/ui:
      - TypeScriptFrameworkQuestion
    frontend/e2e: []

