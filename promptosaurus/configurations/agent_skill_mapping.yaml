# Agent-Skill-Workflow Mapping Registry
# Maps agents to their skills and workflows (language-agnostic)
# Language-specific overrides can be added in language_skill_mapping.yaml
#
# Last updated: 2026-04-12
#
# This file defines which skills and workflows each agent has access to.
# These mappings apply regardless of programming language.
#
# Priority Resolution:
# 1. agent_skill_mapping.yaml - Base skills for agent (this file)
# 2. language_skill_mapping.yaml - Language+agent overrides (rare)
# 3. Fallback - Original agent skills/workflows (if no mappings)

