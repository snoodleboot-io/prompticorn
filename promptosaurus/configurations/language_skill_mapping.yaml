# Language-Skill-Workflow Mapping Registry
# Language-specific overrides for skills and workflows
# Last updated: 2026-04-12
#
# IMPORTANT: Most skills/workflows are defined in agent_skill_mapping.yaml
# This file is ONLY for language-specific overrides (rare cases)
#
# Default Resolution Priority:
# 1. agent_skill_mapping.yaml - Base skills for agent (language-agnostic)
# 2. language_skill_mapping.yaml - Language+agent overrides (THIS FILE)
# 3. Fallback - Original agent skills/workflows
#
# Example of when to use language overrides:
# rust/architect:
#   skills:
#     - architecture-documentation
#     - rust-specific-ownership-skill  # ONLY added for Rust
#
# For most cases, agent_skill_mapping.yaml is sufficient.

